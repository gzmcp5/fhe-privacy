name: Build OpenFHE wheels

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact: openfhe-linux-x86_64-cp313
          - runner: macos-14
            artifact: openfhe-macos-arm64-cp313
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.13.3"
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes build-essential cmake
      - name: Install macOS build dependencies
        if: runner.os == 'macOS'
        run: brew install cmake libomp
      - name: Build platform wheel
        env:
          OPENFHE_BUILD_JOBS: "3"
          PYTHON: python3.13
        run: ./tools/openfhe/build-wheel.sh
      - name: Verify platform wheel
        run: |
          python3.13 -m venv .wheel-test
          .wheel-test/bin/pip install vendor/wheels/openfhe-*.whl
          .wheel-test/bin/python tools/openfhe/smoke.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: vendor/wheels/*.whl
          if-no-files-found: error
